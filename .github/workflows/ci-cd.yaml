name: CI/CD Pipeline

# Триггеры: запускать воркфлоу при push в ветку 'main', 'dev' и при PR во все
on:
  push:
    branches: ['main', 'dev']
  pull_request:
    branches: ['*']
  # Позволяет вручную запустить этот рабочий процесс из вкладки Actions в GitHub
  workflow_dispatch:

permissions:
  contents: read # Право на чтение содержимого репозитория (для checkout)
  pull-requests: write # Право на запись в Pull Requests (для комментирования)

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Клонирование репозитория
      - name: Checkout repository
        uses: actions/checkout@v4

      # Настройка Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      # Установка зависимостей
      - name: Install dependencies
        run: npm ci

      # Проверка линтером и форматом
      - name: Run linter and check format
        run: |
          npm run lint
          npm run format:check

      # Запуск тестов
      - name: Run tests
        run: npm run test:run

      # Генерация отчета о покрытии
      - name: Run tests and generate coverage summary
        id: coverage
        env:
          NO_COLOR: true # Отключаем цветной вывод для лучшей читаемости в комментариях

        # Запуск тестов с покрытием и сохранение результатов в файл
        run: npm run test:coverage:run | tee coverage-summary.txt

      # Удаление старого комментария с покрытием в PR
      - name: Delete old coverage comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const botCommentIdentifier = "## 🧪 Test Coverage Report";

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const oldComment = comments.find(comment => 
              comment.user.login === 'github-actions[bot]' && 
              comment.body.startsWith(botCommentIdentifier)
            );

            if (oldComment) {
              console.log(`Found old comment with id: ${oldComment.id}. Deleting...`);
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: oldComment.id,
              });
              console.log('Old comment deleted.');
            } else {
              console.log('No old coverage comment found.');
            }
      # Публикация комментария с результатами в PR
      - name: Post coverage summary to PR

        # Запускать только для событий pull_request
        if: github.event_name == 'pull_request'

        uses: actions/github-script@v7
        with:
          # Этот токен предоставляется GitHub автоматически и имеет права на комментирование
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('coverage-summary.txt', 'utf8');

            const body = `## 🧪 Test Coverage Report\n\n\`\`\`\n${summary}\n\`\`\``;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

      # Загрузка полного HTML-отчета как артефакта
      - name: Upload full coverage report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-html
          path: coverage/
          retention-days: 7 # Хранить артефакт 7 дней

      - name: Check repository visibility
        run: |
          echo "Value of github.event.repository.private is: ${{ github.event.repository.private }}"
