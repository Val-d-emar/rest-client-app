name: CI/CD Pipeline

# Triggers: run the workflow on push to the 'main', 'dev' branches and on PR to all.
on:
  push:
    branches: ['main', 'dev']
  pull_request:
    branches: ['*']
  # Allows you to manually trigger this workflow from the Actions tab in GitHub.
  workflow_dispatch:

permissions:
  contents: read #The right to read the contents of the repository (for checkout)
  pull-requests: write # The right to write in Pull Requests (for commenting)

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Cloning the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Settings Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      # Installing dependencies
      - name: Install dependencies
        run: npm ci

      # Linting and formatting check
      - name: Run linter and check format
        run: |
          npm run lint
          npm run format:check

      # Launching tests
      - name: Run tests
        run: npm run test:run

      # Generation of coverage report
      - name: Run tests and generate coverage summary
        id: coverage
        env:
          NO_COLOR: true # Disable colored output for better readability in comments.

        # Running tests with coverage and saving the results to a file
        run: npm run test:coverage:run | tee coverage-summary.txt

      # Removing old comment with coverage in PR
      - name: Delete old coverage comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const botCommentIdentifier = "## 🧪 Test Coverage Report";

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const oldComment = comments.find(comment => 
              comment.user.login === 'github-actions[bot]' && 
              comment.body.startsWith(botCommentIdentifier)
            );

            if (oldComment) {
              console.log(`Found old comment with id: ${oldComment.id}. Deleting...`);
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: oldComment.id,
              });
              console.log('Old comment deleted.');
            } else {
              console.log('No old coverage comment found.');
            }
      # Publication of a comment with results in the PR
      - name: Post coverage summary to PR

        # Run only for pull_request events
        if: github.event_name == 'pull_request'

        uses: actions/github-script@v7
        with:
          #This token is provided by GitHub automatically and has rights to comment.
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('coverage-summary.txt', 'utf8');

            const body = `## 🧪 Test Coverage Report\n\n\`\`\`\n${summary}\n\`\`\``;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

      # Uploading the full HTML report as an artifact
      - name: Upload full coverage report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-html
          path: coverage/
          retention-days: 7 #Store the artifact for 7 days

      - name: Check repository visibility
        run: |
          echo "Value of github.event.repository.private is: ${{ github.event.repository.private }}"

  deploy-preview:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy to Vercel and Capture URL
        id: deploy
        run: echo "preview_url=$(vercel deploy --token=${{ secrets.VERCEL_TOKEN }})" >> $GITHUB_OUTPUT

      - name: Post Preview URL to PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          message: '🚀 **Vercel Preview is ready** here: ${{ steps.deploy.outputs.preview_url }}'
